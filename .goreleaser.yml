version: 2

builds:
  - main: ./cmd/lazyjira
    binary: lazyjira
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - name: lazyjira
    description: "Terminal UI for Jira"
    homepage: "https://github.com/textfuel/lazyjira"
    binaries:
      - lazyjira
    repository:
      owner: textfuel
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

nfpms:
  - package_name: lazyjira
    maintainer: "textfuel <https://github.com/textfuel>"
    homepage: "https://github.com/textfuel/lazyjira"
    description: "Terminal UI for Jira"
    license: MIT
    formats:
      - deb
      - rpm
      - apk

aurs:
  - name: lazyjira-bin
    homepage: "https://github.com/textfuel/lazyjira"
    description: "Terminal UI for Jira (prebuilt binary)"
    license: "MIT"
    private_key: "{{ .Env.AUR_SSH_PRIVATE_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/lazyjira-bin.git"
    provides:
      - lazyjira
    conflicts:
      - lazyjira
      - lazyjira-git
    package: |-
      install -Dm755 "./lazyjira" "${pkgdir}/usr/bin/lazyjira"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/lazyjira/LICENSE"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

changelog:
  sort: asc

release:
  footer: |
    ---
    **Full changelog:** [CHANGELOG.md](https://github.com/textfuel/lazyjira/blob/main/CHANGELOG.md)
