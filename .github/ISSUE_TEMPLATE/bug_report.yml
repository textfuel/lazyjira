name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run lazyjira
        2. Navigate to ...
        3. Press ...
  - type: input
    id: version
    attributes:
      label: lazyjira version
      placeholder: "lazyjira --version"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: e.g. iTerm2, Alacritty, Windows Terminal
