name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: check (make check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: make lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

      - name: make vet
        run: make vet

      - name: make build
        run: make build

      - name: make test
        run: make test

  nix:
    name: nix (make nix-deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: nix build .#lazyjira
        run: nix build .#lazyjira
