name: nix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - go.mod
      - go.sum
      - gomod2nix.toml
      - flake.nix
      - flake.lock
      - nix/package.nix
      - nix/shell.nix

permissions:
  contents: read

jobs:
  build:
    name: nix build .#lazyjira
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: nix build .#lazyjira
        run: nix build .#lazyjira
